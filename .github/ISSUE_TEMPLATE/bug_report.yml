name: Bug report
description: Something in Qurasearch doesn't work as documented.
labels: ['type:bug']
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the monorepo is affected?
      options:
        - extension
        - server
        - shared
        - ci
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: The actual, observed behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the side panel on …
        2. Click …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Browser + extension version
      placeholder: 'Chrome 137 · Qurasearch 0.1.0'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Console output, service-worker logs, or server logs. Automatically formatted as code.
      render: shell
