name: Feature request
description: Propose an improvement or a new capability.
labels: ['type:feature']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is harder than it should be?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Sketches and examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or rejected.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the monorepo would this touch?
      options:
        - extension
        - server
        - shared
        - ci
