name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'

permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v4

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Audit dependencies
        # Root lockfile covers every workspace
        run: npm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    # pull-requests:write lets the action post its leak-detection comment on
    # PRs; the scan/gate itself works without it but 403s in the logs.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

  security:
    # Summary gate: the "security" required check on main (engineering.md §3)
    needs: [codeql, audit, gitleaks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any security job failed or was cancelled
        env:
          CODEQL_RESULT: '${{ needs.codeql.result }}'
          AUDIT_RESULT: '${{ needs.audit.result }}'
          GITLEAKS_RESULT: '${{ needs.gitleaks.result }}'
        run: |
          echo "codeql=$CODEQL_RESULT audit=$AUDIT_RESULT gitleaks=$GITLEAKS_RESULT"
          for result in "$CODEQL_RESULT" "$AUDIT_RESULT" "$GITLEAKS_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::A security job ended with result '$result'"
              exit 1
            fi
          done
          echo "OK: no security job failed (skipped passes)"
