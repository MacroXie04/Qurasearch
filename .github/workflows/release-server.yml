name: Release server

on:
  push:
    tags: ['srv-v*']

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ secrets.GITHUB_TOKEN }}'

      - name: Derive version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#srv-v}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/macroxie04/qurasearch-server:${{ env.VERSION }}
            ghcr.io/macroxie04/qurasearch-server:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # Deploy gate: required reviewers live on the environment (engineering.md §7)
    environment: production
    permissions:
      contents: read
    steps:
      - name: Deploy (placeholder)
        run: |
          echo "TODO(engineering.md §7, phase 4): real deploy hook lands here —"
          echo "run migrations, then roll ghcr.io/macroxie04/qurasearch-server to the new image."
